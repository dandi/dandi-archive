[tox]
min_version = 4.22
requires =
    tox-uv
envlist =
    lint
    # type
    test
    check-migrations

[testenv]
runner = uv-venv-lock-runner
pass_env =
    DJANGO_*
extras =
    development

[testenv:lint]
package = skip
dependency_groups =
    lint
allowlist_externals =
    bash
    find
    xargs
commands =
    ruff check
    ruff format --check
    bash -c 'find web/src -name "*.vue" -o -name "*.ts" | xargs bash scripts/check-no-hardcoded-dandi.sh'

[testenv:format]
package = skip
dependency_groups =
    lint
commands =
    ruff check --fix-only
    ruff format

[testenv:type]
dependency_groups =
    type
    test
commands =
    mypy {posargs}

[testenv:test]
dependency_groups =
    test
commands =
    pytest {posargs}

[testenv:check-migrations]
set_env =
    DJANGO_SETTINGS_MODULE = dandiapi.settings.testing
commands =
    {envpython} ./manage.py makemigrations --check --dry-run
